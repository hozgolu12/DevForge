version: '3.8'

services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devforge-workspace
    volumes:
      # Mount the repository root directory into the dev container
      - ..:/workspace:cached
      # Mount the host Docker daemon socket to control host containers
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devforge-network
    # Run as vscode non-root user (provided by Microsoft base image)
    user: vscode
    # Keep container running in background
    command: /bin/sh -c "while sleep 1000; do :; done"

networks:
  devforge-network:
    external: true
    name: devforge-network
