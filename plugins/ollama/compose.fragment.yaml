services:
  ollama:
    build:
      context: ./docker/ollama
      dockerfile: Dockerfile
    container_name: "{{ project_name }}-ollama"
    restart: unless-stopped
    environment:
      OLLAMA_MODELS: ${OLLAMA_MODELS_PATH:-/root/.ollama}
    volumes:
      - ollamadata:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    networks:
      - devforge-network
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Uncomment to enable Nvidia GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollamadata:
