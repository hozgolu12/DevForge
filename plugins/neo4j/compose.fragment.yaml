services:
  neo4j:
    build:
      context: ./docker/neo4j
      dockerfile: Dockerfile
    container_name: "{{ project_name }}-neo4j"
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4jdata:/data
      - neo4jlogs:/logs
    ports:
      - "${NEO4J_PORT_HTTP:-7474}:7474"
      - "${NEO4J_PORT_BOLT:-7687}:7687"
    networks:
      - devforge-network
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474/"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M

volumes:
  neo4jdata:
  neo4jlogs:
