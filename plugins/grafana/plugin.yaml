name: grafana
display_name: "Grafana"
version: "10.4"
versions: ["10.4"]
category: monitoring
description: "Metrics visualization and dashboards"
depends_on: [prometheus]
ports:
  - host: 3002
    container: 3000
    env_key: GRAFANA_PORT
volumes:
  - grafanadata:/var/lib/grafana
env:
  GRAFANA_PORT: 3002
  GRAFANA_ADMIN_USER: admin
  GRAFANA_ADMIN_PASSWORD: admin
