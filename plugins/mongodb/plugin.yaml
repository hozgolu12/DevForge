name: mongodb
display_name: "MongoDB"
version: "7.0"
versions: ["6", "7", "8"]
category: database
description: "Document-oriented NoSQL database"
depends_on: []
ports:
  - host: 27017
    container: 27017
    env_key: MONGO_PORT
volumes:
  - mongodata:/data/db
  - mongoconfig:/data/configdb
env:
  MONGO_INITDB_ROOT_USERNAME: mongo_admin
  MONGO_INITDB_ROOT_PASSWORD: SetSecurePasswordHere456!
  MONGO_PORT: 27017
