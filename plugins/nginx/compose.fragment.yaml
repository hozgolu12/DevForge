services:
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: "{{ project_name }}-nginx"
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:8080"
      - "${NGINX_SECURE_PORT:-443}:8443"
    networks:
      - devforge-network
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
      - /var/lib/nginx
      - /var/log/nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
