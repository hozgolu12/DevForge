# Redis Configuration for DevForge
# Bind to all interfaces inside the container network
bind 0.0.0.0

# Port to listen on
port 6379

# Run Redis in protected mode
protected-mode yes

# Close the connection after a client is idle for N seconds (0 to disable)
timeout 0

# TCP keepalive
tcp-keepalive 300

# Save the DB on disk (RDB snapshots)
# Save after 900 sec (15 min) if at least 1 key changed
save 900 1
# Save after 300 sec (5 min) if at least 10 keys changed
save 300 10
# Save after 60 sec if at least 10000 keys changed
save 60 10000

# Maximum memory limit (Prevents consuming host memory)
maxmemory 256mb
maxmemory-policy allkeys-lru

# Append Only Mode (AOF durability)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
